# GitHub contribution snake animation generator
# Generates snake animation SVG from contribution graph

name: Generate Snake Animation

on:
  # Run every 6 hours
  schedule:
    - cron: "0 */6 * * *"
  # Allow manual trigger
  workflow_dispatch:
  # Run on push to master (for initial setup)
  push:
    branches:
      - master

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # Checkout the repository
      - name: Checkout
        uses: actions/checkout@v4

      # Install dependencies for canvas
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgif-dev libgl1-mesa-dev libgl1-mesa-glx

      # Generate the snake SVGs
      - name: Generate github-contribution-grid-snake.svg
        uses: Platane/snk@v3
        with:
          github_user_name: IRandonation
          outputs: |
            output/github-contribution-grid-snake.svg
            output/github-contribution-grid-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Push the generated files
      - name: Push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: output
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}